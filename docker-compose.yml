services:
  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-roster_app_dev}
    restart: unless-stopped
    ports:
      - "${APP_EXTERNAL_PORT:-8082}:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./invoices:/app/invoices
    depends_on:
      - osrm

  osrm:
    image: osrm/osrm-backend
    container_name: ${OSRM_CONTAINER_NAME:-roster_osrm_dev}
    restart: unless-stopped
    ports:
      - "${OSRM_EXTERNAL_PORT:-5000}:5000"
    # To run OSRM, you need map data.
    # The command below runs the daemon, but YOU MUST HAVE PRE-PROCESSED the .osrm files
    # mounted in `/data`. 
    # Example: you need to download a map (e.g. australia-oceania-latest.osm.pbf)
    # process it using osrm-extract, osrm-partition, osrm-customize
    # and then mount that directory here.
    volumes:
      - ./osrm-data:/data
    command: "osrm-routed --algorithm mld /data/map.osrm"
